services:
  airs:
    build:
      context: ./airs
      args:
        - AIRS_BASE_IMAGE=${AIRS_BASE_IMAGE}
    image: ${AIRS_TAG}
    container_name: airs
    ports:
      - "8080:8080"
      - "5173:5173"
    volumes:
      - /home/josh/work:/home/josh
      - /home/josh/.ssh:/home/josh/.ssh:ro
    environment:
      CS_USER: josh
      CS_UID: 10000
      CS_GID: 10000